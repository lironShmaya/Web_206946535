<!DOCTYPE html>
<html lang="en" xmlns="">
<head>
  <meta charset="UTF-8">
  <title>XPark</title>
  <!-- <link rel=stylesheet href="../static/css/signup.css"> -->
  <link rel=stylesheet href="../static/css/css.css">
  <script defer src="../static/js/signup.js"></script>
</head>

<body>
<nav class="container">
    <div class="banner">
      <h1>XPark</h1>
      </div>
    </nav> <!--Banner-->
    <div class="doc">
          <h2>Sign-Up</h2>
        <div class="form">
          <form name="signup" onsubmit="return validateForm()" method="post" type="submit" action="../views/profile.html">
            <input class="input" type="text" name="fullName" placeholder="Full Name" /><br>
            <input class="input" type="text" name="username" placeholder="Username" /><br>
            <input class="input" type="number" name="contact" placeholder="Contact Number" /><br>
            <input class="input" type="email" name="email" placeholder="Email Address" /><br>
            <input class="input" type="password" name= pass placeholder="Password" /><br>
            <div class="signup">
            <input name="IAgree" type="checkbox"/>
            <label id for="IAgree">I agree to the <a id="IAgree" href="www.google.com">Terms and Services</a></label>
            <br>
           </div>
              <label id="already">Already have an account?  <a href="../views/signin.html" style="color: #7F68F5"> Sign in</a></label>
               <button id="submit" type="submit">Sign-Up</button>
          </form>
      </div> <!--Form-->
    </div> <!--Doc-->


</div>

</div> <!--Container-->
<div class="spinner1">
  <div></div>
  <div></div>
</div>
</body>
</html>
